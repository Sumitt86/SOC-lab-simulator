# dnsmasq configuration — INTENTIONALLY VULNERABLE
# No DNSSEC, zone transfers allowed, minimal logging

# Listen on all interfaces
listen-address=0.0.0.0
bind-interfaces

# Upstream DNS (Google)
server=8.8.8.8
server=8.8.4.4

# Local domain
domain=minisoc.local
local=/minisoc.local/

# Local DNS entries
address=/victim.minisoc.local/127.0.0.1
address=/portal.minisoc.local/127.0.0.1
address=/db.minisoc.local/127.0.0.1
address=/backup.minisoc.local/192.168.1.50

# VULNERABLE: Allow all queries (no ACL)
# VULNERABLE: Logging enabled (helps blue team, but also reveals info)
log-queries
log-facility=/var/log/dnsmasq.log

# VULNERABLE: Large cache (DNS cache poisoning target)
cache-size=1000

# VULNERABLE: No DNSSEC validation
# dnssec  <-- intentionally commented out

# Expand hosts from /etc/hosts
expand-hosts
