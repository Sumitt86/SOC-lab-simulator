spring.application.name=mini-soc-lab-backend
server.port=8080
management.endpoints.web.exposure.include=health,info

# ==================== Cyber Range Mode ====================
# docker = use docker exec (default, for containerized lab)
# ssh    = use SSH (for VM-based lab)
cyber-range.mode=${CYBER_RANGE_MODE:docker}

# ==================== Docker Container Configuration ====================
cyber-range.victim.container=${VICTIM_CONTAINER:soc-victim}
cyber-range.attacker.container=${ATTACKER_CONTAINER:soc-attacker}
cyber-range.victim.hostname=victim
cyber-range.c2.port=${C2_PORT:4444}

# ==================== SSH Configuration (VM mode only) ====================
# cyber-range.victim.ip=192.168.56.101
# cyber-range.kali.ip=192.168.56.100
# cyber-range.ssh.key-path=/path/to/key
# cyber-range.ssh.user=soc_agent
# cyber-range.ssh.timeout=10
