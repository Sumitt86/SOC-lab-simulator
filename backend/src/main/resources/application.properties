spring.application.name=mini-soc-lab-backend
server.port=8080
management.endpoints.web.exposure.include=health,info

# ==================== Cyber Range VM Configuration ====================
# Set these to your actual VM IPs (VirtualBox host-only network)
cyber-range.victim.ip=${VICTIM_IP:}
cyber-range.kali.ip=${KALI_IP:}
cyber-range.c2.ip=${C2_IP:10.0.0.30}
cyber-range.c2.port=${C2_PORT:4444}

# SSH configuration
cyber-range.ssh.key-path=${SSH_KEY_PATH:}
cyber-range.ssh.user=${SSH_USER:soc_agent}
cyber-range.ssh.timeout=${SSH_TIMEOUT:10}
