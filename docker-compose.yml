services:
  backend:
    build:
      context: ./backend
    container_name: mini-soc-backend
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CYBER_RANGE_MODE=docker
      - VICTIM_CONTAINER=soc-victim
      - ATTACKER_CONTAINER=soc-attacker
    depends_on:
      - victim
      - attacker
    networks:
      - soc-network

  frontend:
    build:
      context: ./frontend
    container_name: mini-soc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - soc-network

  victim:
    build:
      context: ./containers/victim
    container_name: soc-victim
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    ports:
      - "8022:22"    # SSH (Vector 2: Brute Force)
      - "8880:80"    # HTTP (Vector 1: Web App Exploitation)
      - "8053:53/udp" # DNS (Vector 3: DNS Poisoning)
      - "8053:53/tcp"
      # MySQL (3306) exposed only within soc-network — no host mapping needed
    volumes:
      - victim-logs:/var/log    # Persist logs for blue team analysis
    environment:
      - BACKEND_URL=http://backend:8080
      - MONITOR_INTERVAL=2
    networks:
      soc-network:
        aliases:
          - victim
          - victim.minisoc.local

  attacker:
    build:
      context: ./containers/attacker
    container_name: soc-attacker
    cap_add:
      - NET_ADMIN
    networks:
      soc-network:
        aliases:
          - attacker

networks:
  soc-network:
    driver: bridge

volumes:
  victim-logs:
    driver: local
